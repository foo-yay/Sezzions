[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
; Coverage enabled by default (adds ~2s overhead).
; For speed runs without coverage: pytest --no-cov
addopts = 
    --verbose
    --cov=models
    --cov=repositories
    --cov=services
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=0
