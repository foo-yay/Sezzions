name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (e.g. 1.0.1). Leave blank to auto-bump patch."
        required: false
        default: ""
      next_patch:
        description: "Auto-increment patch from __version__"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app bundle
        run: |
          python -m PyInstaller --noconfirm --clean --name sezzions-macos-arm64 --windowed --add-data "resources:resources" sezzions.py
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Sezzions" dist/sezzions-macos-arm64.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Sezzions" dist/sezzions-macos-arm64.app/Contents/Info.plist

      - name: Zip macOS bundle
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent dist/sezzions-macos-arm64.app release/sezzions-macos-arm64.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: sezzions-macos-arm64
          path: release/sezzions-macos-arm64.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows app
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --name sezzions-windows-x64 --windowed --add-data "resources;resources" sezzions.py

      - name: Zip Windows bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path dist/sezzions-windows-x64/* -DestinationPath release/sezzions-windows-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sezzions-windows-x64
          path: release/sezzions-windows-x64.zip

  publish:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: sezzions-macos-arm64
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: sezzions-windows-x64
          path: release-assets

      - name: Publish update assets
        env:
          GH_TOKEN: ${{ secrets.SEZZIONS_UPDATES_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "SEZZIONS_UPDATES_TOKEN secret is required" >&2
            exit 1
          fi

          VERSION_INPUT="${{ github.event.inputs.version }}"
          NEXT_PATCH_INPUT="${{ github.event.inputs.next_patch }}"

          if [ "${NEXT_PATCH_INPUT}" = "true" ] || [ -z "${VERSION_INPUT}" ]; then
            python3 tools/release_update.py \
              --next-patch \
              --asset-path release-assets/sezzions-macos-arm64.zip \
              --extra-asset windows-x64=release-assets/sezzions-windows-x64.zip
          else
            python3 tools/release_update.py \
              --version "${VERSION_INPUT}" \
              --asset-path release-assets/sezzions-macos-arm64.zip \
              --extra-asset windows-x64=release-assets/sezzions-windows-x64.zip
          fi
